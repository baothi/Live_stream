<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Meeting Translator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    .header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 16px;
      text-align: center;
    }

    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #1f1f1f;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 10px;
    }

    /* Login Form */
    #login-section input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #fff;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
    }

    #login-section input:focus {
      border-color: #6366f1;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #6366f1;
      color: #fff;
    }

    .btn-primary:hover { background: #5558e8; }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }

    /* Status indicator */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #374151;
      margin-right: 8px;
    }

    .status-dot.active {
      background: #10b981;
      box-shadow: 0 0 6px #10b981;
      animation: pulse 2s infinite;
    }

    .status-dot.connecting {
      background: #f59e0b;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text { font-size: 13px; flex: 1; }

    /* Toggle Switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }

    .toggle-label { font-size: 13px; color: #ccc; }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #374151;
      border-radius: 24px;
      cursor: pointer;
      transition: 0.3s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .toggle-slider { background: #6366f1; }
    input:checked + .toggle-slider::before { transform: translateX(20px); }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-box {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat-value { font-size: 20px; font-weight: 700; color: #6366f1; }
    .stat-label { font-size: 10px; color: #666; margin-top: 2px; }

    /* User info */
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      background: #6366f1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .user-name { font-size: 13px; font-weight: 600; }
    .user-email { font-size: 11px; color: #666; }

    .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    /* Uninstall footer */
    .footer {
      padding: 12px 16px;
      text-align: center;
      border-top: 1px solid #1f1f1f;
    }

    .btn-uninstall {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #555;
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      width: auto;
      font-weight: 400;
    }

    .btn-uninstall:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: rgba(239,68,68,0.05);
    }

    #main-section { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>AI Meeting Translator</h1>
    <p>Viet -> English realtime</p>
  </div>

  <!-- LOGIN SECTION -->
  <div id="login-section" class="section">
    <div class="section-title">Dang nhap</div>
    <input type="email" id="email" placeholder="Email cua ban" />
    <input type="password" id="password" placeholder="Mat khau" />
    <button class="btn btn-primary" id="login-btn">Dang nhap</button>
    <p class="error-msg" id="login-error">Email hoac mat khau khong dung</p>
  </div>

  <!-- MAIN SECTION (sau khi login) -->
  <div id="main-section">

    <!-- User Info -->
    <div class="section">
      <div class="user-info">
        <div class="avatar" id="user-avatar">N</div>
        <div>
          <div class="user-name" id="user-name">User</div>
          <div class="user-email" id="user-email">user@email.com</div>
        </div>
        <button class="btn btn-danger" id="logout-btn" style="width:auto;padding:6px 12px;margin-left:auto;font-size:11px">Logout</button>
      </div>
    </div>

    <!-- Status -->
    <div class="section">
      <div class="section-title">Trang thai</div>
      <div class="status-row">
        <div class="status-dot" id="status-dot"></div>
        <div class="status-text" id="status-text">Chua ket noi</div>
      </div>

      <div class="toggle-wrap">
        <span class="toggle-label">Bat dich tu dong</span>
        <label class="toggle">
          <input type="checkbox" id="translate-toggle" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Stats -->
    <div class="section">
      <div class="section-title">Phien nay</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value" id="stat-time">0:00</div>
          <div class="stat-label">Thoi gian</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-words">0</div>
          <div class="stat-label">Cau da dich</div>
        </div>
      </div>
    </div>

  </div>

  <!-- FOOTER: Nut go cai dat (hien thi ca khi chua login) -->
  <div class="footer">
    <button class="btn-uninstall" id="uninstall-btn">🗑️ Gỡ cài đặt extension</button>
  </div>

</body>
<script src="popup.js"></script>
</html>
