<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="micGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="128" height="128" rx="28" fill="#12121a"/>

  <!-- Glow -->
  <ellipse cx="64" cy="52" rx="32" ry="32" fill="url(#glowGrad)"/>

  <!-- Mic body -->
  <rect x="49" y="18" width="30" height="48" rx="15" fill="url(#micGrad)" stroke="#a5b4fc" stroke-width="1.5" opacity="0.95"/>

  <!-- Grille lines -->
  <line x1="55" y1="31" x2="73" y2="31" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="38" x2="73" y2="38" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="45" x2="73" y2="45" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Stand arc -->
  <path d="M40 66 Q40 92 64 92 Q88 92 88 66" fill="none" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="92" x2="64" y2="103" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="103" x2="78" y2="103" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>

  <!-- Sound waves -->
  <path d="M94 44 Q101 52 94 60" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
  <path d="M100 39 Q110 52 100 65" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- EN Badge -->
  <rect x="75" y="77" width="32" height="18" rx="9" fill="#10b981"/>
  <text x="91" y="86" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-weight="700" font-size="10" fill="white">EN</text>
</svg>